<section id="contact-me">
  <div class="content">
    <div class="content__title">
      <img src="assets/icons/line-horizontal.png" alt="line-horizontal" />
      <h2>Contact</h2>
    </div>
    <div class="content__details">
      <div class="detail">
        <h4>Got a problem to solve?</h4>
        <p class="detail__p-1">
          Encourage people to contact you and describe what role you are interested in. Show that
          you will add value to their projects through your work.
        </p>
        <p class="detail__p-2">Need a Frontend developer? <span>Contact me!</span></p>
      </div>
      <div>
        <form action="#" class="form">
          <input type="text" name="name" id="name" value="Your name" />
          <input type="email" name="email" id="email" value="Your email" />
          <textarea name="message" id="message">Your message</textarea>
          <div class="form__checkbox">
            <input type="checkbox" name="privacy-policy" id="privacy1" value="privacy" />
            <label for="privacy1"
              >I've read the privacy policy and agree to the processing of my data as
              outlined.</label
            >
          </div>

          <button type="submit" class="button btn--disabled">Send message :)</button>
        </form>
      </div>
    </div>
    <a href="#" class="content__arrow-up">
      <img src="assets/icons/arrow-up.png" alt="move up" />
    </a>
  </div>
</section>
